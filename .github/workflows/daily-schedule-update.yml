name: Daily schedule update

on:
  schedule:
    - cron: "25 21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install icalendar recurring-ical-events

      - name: Fetch calendar events
        env:
          CALENDAR_ICS_URL: ${{ secrets.CALENDAR_ICS_URL }}
        run: python fetch_calendar.py schedule_data.json

      - name: Splice into index.html
        run: python update_schedule.py index.html schedule_data.json

      - name: Commit and push if changed
        run: |
          rm -f schedule_data.json
          if git diff --quiet -- index.html; then
            echo "No changes."
            exit 0
          fi
          git config user.name "kinoshita-portal-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html
          git commit -m "Update schedule $(date -u +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main
            if git push; then
              exit 0
            fi
            echo "Push attempt $i failed, retrying..."
            sleep $((RANDOM % 8 + 2))
          done
          exit 1
