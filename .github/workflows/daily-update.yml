name: Daily news update

on:
  schedule:
    - cron: "30 21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch RSS feeds
        run: python fetch_feeds.py feed_data.json

      - name: Splice into index.html
        run: python update_news.py index.html feed_data.json

      - name: Commit and push if changed
        run: |
          rm -f feed_data.json
          if git diff --quiet -- index.html; then
            echo "No changes."
            exit 0
          fi
          git config user.name "kinoshita-portal-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html
          git commit -m "Daily news update $(date -u +%Y-%m-%d)"
          git push
